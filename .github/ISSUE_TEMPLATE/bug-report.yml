name: Bug report
description: Report an incorrect calculation, broken interaction, or visual defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and operating system
  - type: textarea
    id: scenario
    attributes:
      label: Sanitized scenario inputs
      description: Do not include confidential company data.
